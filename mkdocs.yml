site_name: Pacific Climate Data in Google Earth Engine
site_description: >-
  A hands-on training course for finding, processing and localizing global
  climate datasets for Pacific Island nations using Google Earth Engine.
  SPREP / UNEP CIS-Pac5 — Regional Capacity Building on GIS & Data Management.
site_author: SPREP / UNEP CIS-Pac5
copyright: >-
  © 2026 SPREP / UNEP CIS-Pac5 — Regional Capacity Building on GIS & Data Management.
  Course content shared for educational use.

# IMPORTANT: set these two for GitHub Pages. Replace tavitas.
site_url: https://tavitas.github.io/sprep-gee-climate-workshop/
repo_url: https://github.com/tavitas/sprep-gee-climate-workshop
repo_name: sprep-gee-climate-workshop
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  icon:
    logo: material/earth
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

nav:
  - Home: index.md
  - About:
      - The UNEP CIS-Pac5 programme: about/cis-pac5.md
  - Course details:
      - Overview: course-details/overview.md
      - Navigating this course: course-details/navigation.md
      - Downloads: course-details/downloads.md
  - Datasets: datasets/index.md
  - Google Earth Engine:
      - What is Earth Engine?: datasets/what-is-gee.md
      - Workshop themes: datasets/themes.md
      - Dataset quick reference: datasets/reference.md
  - Google Colab:
      - What is Google Colab?: colab/index.md
      - Set up Colab & Earth Engine: colab/setup.md
      - Run the workshop scripts: colab/run-scripts.md
  - Exercises:
      - "1 · Set up your account": exercises/account-setup.md
      - "2 · Code Editor basics": exercises/code-editor.md
      - "3 · Coral reef habitats": exercises/coral-reefs.md
      - "4 · Rainfall & drought": exercises/rainfall.md
      - "5 · Temperature & heat": exercises/temperature.md
      - "6 · Ocean & coast": exercises/ocean-coast.md
  - Scripts & code:
      - Using the scripts: scripts/index.md
      - JavaScript (Code Editor): scripts/javascript.md
      - Python (geemap): scripts/python.md
      - AI assistant (Ask): scripts/ai-assistant.md
      - Live diagnostic check: scripts/diagnostic.md
  - Resources:
      - Glossary: resources/glossary.md
      - Validation report: resources/validation.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://www.sprep.org
      name: SPREP
  generator: false
